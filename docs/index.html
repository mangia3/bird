<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>bird files</title>
  <style>
    :root {
      --bg: #0d1117;
      --panel: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8d96a0;
      --accent: #58a6ff;
      --twin: #a371f7;
    }
    * { box-sizing: border-box; }
    body { margin: 0; padding: 0; background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.5; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .container { max-width: 1100px; margin: 0 auto; padding: 32px 24px 80px; }
    h1 { font-size: 28px; margin: 0 0 6px 0; font-weight: 600; }
    h1 .tag { font-size: 13px; background: #1f2630; color: var(--muted); padding: 3px 8px; border-radius: 4px; margin-left: 10px; vertical-align: middle; }
    .sub { color: var(--muted); margin: 0 0 8px 0; }
    .sub a { font-weight: 500; }
    .readme-links { margin: 0 0 32px 0; font-size: 14px; }
    .readme-links a { font-weight: 500; }
    h2 { font-size: 17px; margin: 28px 0 12px 0; font-weight: 600; padding-bottom: 6px; border-bottom: 1px solid var(--border); display: flex; align-items: baseline; gap: 10px; }
    h2 .count { font-size: 12px; color: var(--muted); font-weight: 400; }
    h2.twin { color: var(--twin); }
    h2.twin .count { color: var(--twin); opacity: 0.7; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 8px; }
    .card { display: flex; align-items: center; padding: 10px 12px; background: var(--panel);
      border: 1px solid var(--border); border-radius: 6px; transition: border-color 0.1s, background 0.1s; }
    .card:hover { border-color: var(--accent); background: #1f2630; }
    .card a { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 13px; font-family: ui-monospace, SFMono-Regular, monospace; }
    .card .ext { font-size: 11px; color: var(--muted); margin-left: 8px; }
    .card.twin { border-color: rgba(163, 113, 247, 0.4); background: rgba(163, 113, 247, 0.05); }
    .card.twin:hover { border-color: var(--twin); background: rgba(163, 113, 247, 0.12); }
    .footer { margin-top: 56px; padding-top: 20px; border-top: 1px solid var(--border); color: var(--muted); font-size: 13px; }
    .links { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 12px; }
    .pill { display: inline-block; padding: 4px 10px; background: var(--panel); border: 1px solid var(--border); border-radius: 16px; font-size: 12px; }
    .pill.twin { border-color: var(--twin); color: var(--twin); }
  </style>
</head>
<body>
  <div class="container">
    <h1>bird</h1>
    <p class="sub">revisiting one of my high school senior thesis projects</p>
    <p class="readme-links">
      [<a href="timf.pdf">timf</a>]
      [<a href="https://www.rcgroups.com/forums/showthread.php?3931791-F-22-Raptor-700mm-regular-PLA-and-LW-PLA-versions#post47446455" target="_blank" rel="noopener">rcgroup</a>]
      [<a href="./">files</a>]
      [<a href="https://github.com/aryan-cs/bird" target="_blank" rel="noopener">repo</a>]
    </p>

    <div id="list"></div>
  </div>

  <script>
    // List of STLs in the repo. Sourced from `find jet twin_edf/output/stl -name '*.stl'`.
    // Update this list when files are added/removed (or regenerate with the
    // helper in /docs/build_index.py).
    const SECTIONS = [
      {
        title: 'Assembled',
        files: [
          'jet/f22.json',
          'jet/fuselage.json',
          'jet/wing_left.json',
          'jet/wing_right.json',
        ],
      },
      {
        title: 'Fuselage',
        files: [
          'jet/LW-PLA/F22_Raptor_Fuselage/f22_raptor_canopy.stl',
          'jet/LW-PLA/F22_Raptor_Fuselage/f22_raptor_fan_hatch.stl',
          'jet/LW-PLA/F22_Raptor_Fuselage/f22_raptor_fuse_1.stl',
          'jet/LW-PLA/F22_Raptor_Fuselage/f22_raptor_fuse_1_lowfloor.stl',
          'jet/LW-PLA/F22_Raptor_Fuselage/f22_raptor_fuse_2.stl',
          'jet/LW-PLA/F22_Raptor_Fuselage/f22_raptor_fuse_2_lowfloor.stl',
          'jet/LW-PLA/F22_Raptor_Fuselage/f22_raptor_fuse_3.stl',
          'jet/LW-PLA/F22_Raptor_Fuselage/f22_raptor_fuse_4.stl',
          'jet/LW-PLA/F22_Raptor_Fuselage/f22_raptor_fuse_4_laminate_l.stl',
          'jet/LW-PLA/F22_Raptor_Fuselage/f22_raptor_fuse_4_laminate_l2.stl',
          'jet/LW-PLA/F22_Raptor_Fuselage/f22_raptor_fuse_4_laminate_r.stl',
          'jet/LW-PLA/F22_Raptor_Fuselage/f22_raptor_fuse_4_laminate_r2.stl',
          'jet/LW-PLA/F22_Raptor_Fuselage/f22_raptor_ele_horn_cover_l.stl',
          'jet/LW-PLA/F22_Raptor_Fuselage/f22_raptor_ele_horn_cover_r.stl',
        ],
      },
      {
        title: 'Nose',
        files: [
          'jet/LW-PLA/F22_Raptor_Fuselage/f22_raptor_nose.stl',
          'jet/LW-PLA/F22_Raptor_Fuselage/Sawtooth_Nosecone/f22_raptor_nose_cone.stl',
          'jet/LW-PLA/F22_Raptor_Fuselage/Sawtooth_Nosecone/f22_raptor_nose_main.stl',
          'jet/LW-PLA/F22_Raptor_Fuselage/Simple_Nosecone/f22_raptor_nose_1.stl',
          'jet/LW-PLA/F22_Raptor_Fuselage/Simple_Nosecone/f22_raptor_nose_2.stl',
        ],
      },
      {
        title: 'Horizontal Stabilizer (Taileron)',
        files: [
          'jet/LW-PLA/F22_Raptor_HStab/f22_raptor_hstab_l.stl',
          'jet/LW-PLA/F22_Raptor_HStab/f22_raptor_hstab_r.stl',
          'jet/LW-PLA/F22_Raptor_HStab/f22_raptor_hstab_l_front.stl',
          'jet/LW-PLA/F22_Raptor_HStab/f22_raptor_hstab_l_rear.stl',
          'jet/LW-PLA/F22_Raptor_HStab/f22_raptor_hstab_r_front.stl',
          'jet/LW-PLA/F22_Raptor_HStab/f22_raptor_hstab_r_rear.stl',
          'jet/LW-PLA/F22_Raptor_HStab/f22_raptor_horn_lamination.stl',
          'jet/LW-PLA/F22_Raptor_HStab/f22_raptor_taileron_horn.stl',
        ],
      },
      {
        title: 'Vertical Stabilizer',
        files: [
          'jet/LW-PLA/F22_Raptor_VStab/f22_raptor_vstab_l.stl',
          'jet/LW-PLA/F22_Raptor_VStab/f22_raptor_vstab_r.stl',
          'jet/LW-PLA/F22_Raptor_VStab/f22_raptor_rear_vstab_l.stl',
          'jet/LW-PLA/F22_Raptor_VStab/f22_raptor_rear_vstab_r.stl',
        ],
      },
      {
        title: 'Left Wing',
        files: [
          'jet/LW-PLA/F22_Raptor_Wings/F22_Raptor_Wing_Left/f22_raptor_wing_l1f.stl',
          'jet/LW-PLA/F22_Raptor_Wings/F22_Raptor_Wing_Left/f22_raptor_wing_l1b.stl',
          'jet/LW-PLA/F22_Raptor_Wings/F22_Raptor_Wing_Left/f22_wing_l1b_no_servo.stl',
          'jet/LW-PLA/F22_Raptor_Wings/F22_Raptor_Wing_Left/f22_raptor_wing_l_tip.stl',
          'jet/LW-PLA/F22_Raptor_Wings/F22_Raptor_Wing_Left/f22_raptor_l_ail_inner.stl',
          'jet/LW-PLA/F22_Raptor_Wings/F22_Raptor_Wing_Left/f22_raptor_l_ail_outer.stl',
        ],
      },
      {
        title: 'Right Wing',
        files: [
          'jet/LW-PLA/F22_Raptor_Wings/F22_Raptor_Wing_Right/f22_raptor_wing_r1f.stl',
          'jet/LW-PLA/F22_Raptor_Wings/F22_Raptor_Wing_Right/f22_raptor_wing_r1b.stl',
          'jet/LW-PLA/F22_Raptor_Wings/F22_Raptor_Wing_Right/f22_wing_r1b_no_servo.stl',
          'jet/LW-PLA/F22_Raptor_Wings/F22_Raptor_Wing_Right/f22_raptor_wing_r_tip.stl',
          'jet/LW-PLA/F22_Raptor_Wings/F22_Raptor_Wing_Right/f22_raptor_r_ail_inner.stl',
          'jet/LW-PLA/F22_Raptor_Wings/F22_Raptor_Wing_Right/f22_raptor_r_ail_outer.stl',
        ],
      },
    ];

    const list = document.getElementById('list');
    for (const section of SECTIONS) {
      const h2 = document.createElement('h2');
      h2.className = section.cls || '';
      const t = document.createElement('span');
      t.textContent = section.title;
      h2.appendChild(t);
      const c = document.createElement('span');
      c.className = 'count';
      c.textContent = `${section.files.length} file${section.files.length === 1 ? '' : 's'}`;
      h2.appendChild(c);
      list.appendChild(h2);

      const grid = document.createElement('div');
      grid.className = 'grid';
      for (const f of section.files) {
        const card = document.createElement('div');
        card.className = 'card' + (section.cls ? ' ' + section.cls : '');
        const a = document.createElement('a');
        a.href = `viewer.html?stl=${encodeURIComponent(f)}`;
        a.textContent = f.split('/').pop();
        a.title = f;
        const ext = document.createElement('span');
        ext.className = 'ext';
        const fname = f.split('/').pop();
        const dot = fname.lastIndexOf('.');
        ext.textContent = dot >= 0 ? fname.slice(dot) : '';
        card.appendChild(a);
        card.appendChild(ext);
        grid.appendChild(card);
      }
      list.appendChild(grid);
    }
  </script>
</body>
</html>
