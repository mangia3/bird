<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STL Viewer</title>
  <style>
    :root {
      --bg: #0d1117;
      --panel: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8d96a0;
      --accent: #58a6ff;
      --grid: #2d3340;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 10;
      display: flex; align-items: center; gap: 12px;
      padding: 10px 16px; background: var(--panel); border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    header .crumbs { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    header .crumbs span.sep { color: var(--muted); margin: 0 4px; }
    header .info { color: var(--muted); font-size: 12px; }
    header .info b { color: var(--text); font-weight: 500; }

    #canvas { position: fixed; top: 41px; left: 0; right: 0; bottom: 38px; background: var(--bg); }

    #controls {
      position: fixed; bottom: 0; left: 0; right: 0; height: 38px;
      display: flex; align-items: center; gap: 10px; padding: 0 16px;
      background: var(--panel); border-top: 1px solid var(--border); font-size: 12px;
    }
    #controls button {
      background: var(--bg); color: var(--text); border: 1px solid var(--border);
      padding: 5px 11px; border-radius: 4px; cursor: pointer; font-size: 12px;
    }
    #controls button:hover { background: #1f2630; border-color: #45505f; }
    #controls button.active { background: var(--accent); color: #0d1117; border-color: var(--accent); }
    #controls .spacer { flex: 1; }
    #controls .label { color: var(--muted); }

    #loading {
      position: fixed; inset: 41px 0 38px 0; display: flex; align-items: center; justify-content: center;
      pointer-events: none; color: var(--muted); font-size: 14px; z-index: 5;
    }
    #loading.done { display: none; }
    .spinner {
      display: inline-block; width: 14px; height: 14px; margin-right: 8px;
      border: 2px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #error {
      position: fixed; inset: 80px 0 80px 0; padding: 20px; max-width: 600px; margin: 0 auto;
      background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); font-size: 13px; line-height: 1.5; display: none;
    }
    #error.show { display: block; }
    #error h2 { margin: 0 0 8px 0; color: #ff6b6b; font-size: 16px; }
    #error code { background: var(--bg); padding: 2px 6px; border-radius: 3px; font-size: 12px; }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <header>
    <a href="./" title="Back to index">← bird</a>
    <span class="crumbs" id="crumbs"></span>
    <span class="info" id="info"></span>
  </header>
  <div id="canvas"></div>
  <div id="loading"><span class="spinner"></span>Loading STL…</div>
  <div id="error">
    <h2>Couldn't load this file</h2>
    <p id="error-text"></p>
    <p>Direct file link: <a id="raw-link" href="#" target="_blank" rel="noopener">view raw on GitHub</a></p>
  </div>
  <div id="controls">
    <button id="reset" title="Reset camera">Reset view</button>
    <button id="wireframe" title="Toggle wireframe">Wireframe</button>
    <button id="surface-angle" title="Color faces by surface angle (normal direction)">Surface angle</button>
    <button id="rotate" title="Auto-rotate">Auto-rotate</button>
    <span class="spacer"></span>
    <span class="label" id="dims"></span>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { STLLoader } from 'three/addons/loaders/STLLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const REPO_OWNER = 'aryan-cs';
    const REPO_NAME = 'bird';
    const REPO_BRANCH = 'master';

    const params = new URLSearchParams(window.location.search);
    const stlPath = params.get('stl') || params.get('file');

    if (!stlPath) {
      document.getElementById('loading').classList.add('done');
      showError('No file specified.', 'Pass <code>?stl=path/to/file.stl</code> in the URL, or pick one from <a href="./">the index</a>.');
    } else {
      initViewer(stlPath);
    }

    function showError(text, html) {
      document.getElementById('loading').classList.add('done');
      const err = document.getElementById('error');
      err.classList.add('show');
      document.getElementById('error-text').innerHTML = html || text;
      document.getElementById('raw-link').href = rawUrl(stlPath);
    }

    function jsdelivrUrl(path) {
      return `https://cdn.jsdelivr.net/gh/${REPO_OWNER}/${REPO_NAME}@${REPO_BRANCH}/${path}`;
    }
    function rawUrl(path) {
      return `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/${REPO_BRANCH}/${path}`;
    }

    function setCrumbs(path) {
      const parts = path.split('/');
      const file = parts.pop();
      const dir = parts.join('/');
      const c = document.getElementById('crumbs');
      c.innerHTML = '';
      const segs = path.split('/');
      let acc = '';
      segs.forEach((s, i) => {
        if (i > 0) {
          const sep = document.createElement('span');
          sep.className = 'sep';
          sep.textContent = '/';
          c.appendChild(sep);
        }
        const span = document.createElement('span');
        span.textContent = s;
        if (i === segs.length - 1) span.style.color = 'var(--text)';
        else span.style.color = 'var(--muted)';
        c.appendChild(span);
      });
      document.title = `${file} — STL viewer`;
    }

    async function fetchSTL(path) {
      // Try jsdelivr first (faster, CDN-cached), fall back to raw GitHub on
      // 404 / 50 MB limit.
      const candidates = [jsdelivrUrl(path), rawUrl(path)];
      let lastErr;
      for (const url of candidates) {
        try {
          const resp = await fetch(url);
          if (!resp.ok) { lastErr = `HTTP ${resp.status} from ${url}`; continue; }
          const buf = await resp.arrayBuffer();
          return { buf, url };
        } catch (e) {
          lastErr = e.message;
        }
      }
      throw new Error(lastErr || 'fetch failed');
    }

    function initViewer(path) {
      setCrumbs(path);

      const canvas = document.getElementById('canvas');
      const w = canvas.clientWidth;
      const h = canvas.clientHeight;

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x0d1117);

      const camera = new THREE.PerspectiveCamera(50, w / h, 0.1, 100000);
      camera.position.set(200, 200, 200);

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(w, h);
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      canvas.appendChild(renderer.domElement);

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.07;
      controls.autoRotate = false;
      controls.autoRotateSpeed = 1.2;

      // Lights
      scene.add(new THREE.AmbientLight(0xffffff, 0.4));
      const key = new THREE.DirectionalLight(0xffffff, 0.9);
      key.position.set(1, 1.5, 1);
      scene.add(key);
      const fill = new THREE.DirectionalLight(0x88aaff, 0.35);
      fill.position.set(-1, -0.5, -0.8);
      scene.add(fill);

      // Grid (sized after we know bbox)
      let gridHelper = null;
      let mesh = null;
      let wireframeOn = false;
      let surfaceAngleOn = false;

      // Two materials we swap between. Standard is the default look; surface-
      // angle colors each face by the direction of its normal (R=X, G=Y, B=Z),
      // the same conventional "normal map" coloring github.com's STL viewer
      // uses for its Surface Angle mode.
      const standardMaterial = new THREE.MeshStandardMaterial({
        color: 0x6a92cc, metalness: 0.1, roughness: 0.65,
        flatShading: false, side: THREE.DoubleSide,
      });
      const surfaceAngleMaterial = new THREE.MeshNormalMaterial({
        side: THREE.DoubleSide, flatShading: true,
      });

      function applyMaterial() {
        if (!mesh) return;
        const m = surfaceAngleOn ? surfaceAngleMaterial : standardMaterial;
        m.wireframe = wireframeOn;
        mesh.material = m;
      }

      fetchSTL(path).then(({ buf, url }) => {
        const loader = new STLLoader();
        let geometry;
        try {
          geometry = loader.parse(buf);
        } catch (e) {
          showError('Parse error', `STL parse failed: <code>${e.message}</code>`);
          return;
        }
        geometry.computeBoundingBox();
        geometry.computeVertexNormals();

        mesh = new THREE.Mesh(geometry, standardMaterial);
        scene.add(mesh);

        const bbox = geometry.boundingBox;
        const size = new THREE.Vector3();
        bbox.getSize(size);
        const center = new THREE.Vector3();
        bbox.getCenter(center);

        // Re-center the mesh at world origin so it lines up with the grid
        // regardless of its location in TimF's global fuselage coordinate
        // frame. Bake the offset into the geometry so wireframe etc. follow.
        geometry.translate(-center.x, -center.y, -center.z);
        geometry.computeBoundingBox();

        // Camera fit on the now-centered mesh.
        const maxDim = Math.max(size.x, size.y, size.z);
        const fitDist = maxDim / (2 * Math.tan(Math.PI * camera.fov / 360)) * 1.5;
        controls.target.set(0, 0, 0);
        camera.position.set(fitDist, fitDist * 0.6, fitDist);
        camera.lookAt(0, 0, 0);
        camera.near = Math.max(0.1, maxDim / 1000);
        camera.far = maxDim * 100;
        camera.updateProjectionMatrix();

        // Grid sits directly under the centered mesh.
        const gridSize = Math.ceil(maxDim * 1.5 / 50) * 50;
        gridHelper = new THREE.GridHelper(gridSize, gridSize / 10, 0x2d3340, 0x1a1f29);
        gridHelper.position.y = -size.y / 2;
        scene.add(gridHelper);

        // Info text
        const triCount = geometry.attributes.position.count / 3;
        const sizeStr = `${size.x.toFixed(1)} × ${size.y.toFixed(1)} × ${size.z.toFixed(1)} mm`;
        document.getElementById('info').innerHTML =
          `<b>${triCount.toLocaleString()}</b> triangles · <b>${(buf.byteLength / 1024 / 1024).toFixed(1)}</b> MB`;
        document.getElementById('dims').textContent = sizeStr;
        document.getElementById('loading').classList.add('done');

        // Save initial camera state for reset.
        const initialCam = {
          pos: camera.position.clone(),
          target: controls.target.clone(),
        };
        document.getElementById('reset').addEventListener('click', () => {
          camera.position.copy(initialCam.pos);
          controls.target.copy(initialCam.target);
          camera.lookAt(controls.target);
          controls.update();
        });
      }).catch(err => {
        showError(err.message, `Couldn't fetch <code>${path}</code>: ${err.message}<br>The file might exceed jsDelivr's 50 MB limit, or the path might be wrong.`);
      });

      // Wireframe toggle (works in either material)
      document.getElementById('wireframe').addEventListener('click', (e) => {
        wireframeOn = !wireframeOn;
        applyMaterial();
        e.currentTarget.classList.toggle('active', wireframeOn);
      });
      // Surface angle toggle — swaps to MeshNormalMaterial (color = face normal direction)
      document.getElementById('surface-angle').addEventListener('click', (e) => {
        surfaceAngleOn = !surfaceAngleOn;
        applyMaterial();
        e.currentTarget.classList.toggle('active', surfaceAngleOn);
      });
      // Auto-rotate toggle
      document.getElementById('rotate').addEventListener('click', (e) => {
        controls.autoRotate = !controls.autoRotate;
        e.currentTarget.classList.toggle('active', controls.autoRotate);
      });

      // Resize handler
      window.addEventListener('resize', () => {
        const w = canvas.clientWidth;
        const h = canvas.clientHeight;
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
        renderer.setSize(w, h);
      });

      function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
      }
      animate();
    }
  </script>
</body>
</html>
