<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STL Viewer</title>
  <style>
    :root {
      --bg: #0d1117;
      --panel: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8d96a0;
      --accent: #58a6ff;
      --grid: #2d3340;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 10;
      display: flex; align-items: center; gap: 12px;
      padding: 10px 16px; background: var(--panel); border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    header .crumbs { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    header .crumbs span.sep { color: var(--muted); margin: 0 4px; }
    header .info { color: var(--muted); font-size: 12px; }
    header .info b { color: var(--text); font-weight: 500; }

    #canvas { position: fixed; top: 41px; left: 0; right: 0; bottom: 38px; background: var(--bg); }

    #controls {
      position: fixed; bottom: 0; left: 0; right: 0; height: 38px;
      display: flex; align-items: center; gap: 10px; padding: 0 16px;
      background: var(--panel); border-top: 1px solid var(--border); font-size: 12px;
    }
    #controls button {
      background: var(--bg); color: var(--text); border: 1px solid var(--border);
      padding: 5px 11px; border-radius: 4px; cursor: pointer; font-size: 12px;
    }
    #controls button:hover { background: #1f2630; border-color: #45505f; }
    #controls button.active { background: var(--accent); color: #0d1117; border-color: var(--accent); }
    #controls .spacer { flex: 1; }
    #controls .label { color: var(--muted); }
    #hover-label { font-family: ui-monospace, SFMono-Regular, monospace; font-size: 11px; color: var(--accent); margin-right: 14px; }
    #canvas { cursor: default; }
    #canvas.hovering-part { cursor: pointer; }

    #loading {
      position: fixed; inset: 41px 0 38px 0; display: flex; align-items: center; justify-content: center;
      pointer-events: none; color: var(--muted); font-size: 14px; z-index: 5;
    }
    #loading.done { display: none; }
    .spinner {
      display: inline-block; width: 14px; height: 14px; margin-right: 8px;
      border: 2px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #error {
      position: fixed; inset: 80px 0 80px 0; padding: 20px; max-width: 600px; margin: 0 auto;
      background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); font-size: 13px; line-height: 1.5; display: none;
    }
    #error.show { display: block; }
    #error h2 { margin: 0 0 8px 0; color: #ff6b6b; font-size: 16px; }
    #error code { background: var(--bg); padding: 2px 6px; border-radius: 3px; font-size: 12px; }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <header>
    <a href="./" title="Back to index">← bird</a>
    <span class="crumbs" id="crumbs"></span>
    <span class="info" id="info"></span>
  </header>
  <div id="canvas"></div>
  <div id="loading"><span class="spinner"></span>Loading STL…</div>
  <div id="error">
    <h2>Couldn't load this file</h2>
    <p id="error-text"></p>
    <p>Direct file link: <a id="raw-link" href="#" target="_blank" rel="noopener">view raw on GitHub</a></p>
  </div>
  <div id="controls">
    <button id="reset" title="Reset camera">Reset view</button>
    <button id="wireframe" title="Toggle wireframe">Wireframe</button>
    <button id="surface-angle" title="Color faces by surface angle (normal direction)">Surface angle</button>
    <button id="rotate" title="Auto-rotate">Auto-rotate</button>
    <button id="show-all" title="Show any hidden parts" style="display: none">Show all</button>
    <span class="spacer"></span>
    <span class="label" id="hover-label"></span>
    <span class="label" id="dims"></span>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { STLLoader } from 'three/addons/loaders/STLLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const REPO_OWNER = 'aryan-cs';
    const REPO_NAME = 'bird';
    const REPO_BRANCH = 'master';

    const params = new URLSearchParams(window.location.search);
    const stlPath = params.get('stl') || params.get('file');

    if (!stlPath) {
      document.getElementById('loading').classList.add('done');
      showError('No file specified.', 'Pass <code>?stl=path/to/file.stl</code> in the URL, or pick one from <a href="./">the index</a>.');
    } else if (stlPath.toLowerCase().endsWith('.json')) {
      // Multi-part assembled view: load a manifest listing several STLs that
      // share TimF's global coordinate frame and render them all as separate
      // meshes in one scene. Each part stays at its native (smooth) resolution.
      initMultiViewer(stlPath);
    } else {
      initViewer(stlPath);
    }

    function showError(text, html) {
      document.getElementById('loading').classList.add('done');
      const err = document.getElementById('error');
      err.classList.add('show');
      document.getElementById('error-text').innerHTML = html || text;
      document.getElementById('raw-link').href = rawUrl(stlPath);
    }

    function jsdelivrUrl(path) {
      return `https://cdn.jsdelivr.net/gh/${REPO_OWNER}/${REPO_NAME}@${REPO_BRANCH}/${path}`;
    }
    function rawUrl(path) {
      return `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/${REPO_BRANCH}/${path}`;
    }

    function setCrumbs(path) {
      const parts = path.split('/');
      const file = parts.pop();
      const dir = parts.join('/');
      const c = document.getElementById('crumbs');
      c.innerHTML = '';
      const segs = path.split('/');
      let acc = '';
      segs.forEach((s, i) => {
        if (i > 0) {
          const sep = document.createElement('span');
          sep.className = 'sep';
          sep.textContent = '/';
          c.appendChild(sep);
        }
        const span = document.createElement('span');
        span.textContent = s;
        if (i === segs.length - 1) span.style.color = 'var(--text)';
        else span.style.color = 'var(--muted)';
        c.appendChild(span);
      });
      document.title = file;
    }

    async function fetchSTL(path) {
      // Try jsdelivr first (faster, CDN-cached), fall back to raw GitHub on
      // 404 / 50 MB limit.
      const candidates = [jsdelivrUrl(path), rawUrl(path)];
      let lastErr;
      for (const url of candidates) {
        try {
          const resp = await fetch(url);
          if (!resp.ok) { lastErr = `HTTP ${resp.status} from ${url}`; continue; }
          const buf = await resp.arrayBuffer();
          return { buf, url };
        } catch (e) {
          lastErr = e.message;
        }
      }
      throw new Error(lastErr || 'fetch failed');
    }

    function initScene() {
      const canvas = document.getElementById('canvas');
      const w = canvas.clientWidth;
      const h = canvas.clientHeight;
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x0d1117);
      const camera = new THREE.PerspectiveCamera(50, w / h, 0.1, 100000);
      camera.position.set(200, 200, 200);
      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(w, h);
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      canvas.appendChild(renderer.domElement);
      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.07;
      controls.autoRotate = false;
      controls.autoRotateSpeed = 1.2;
      scene.add(new THREE.AmbientLight(0xffffff, 0.4));
      const key = new THREE.DirectionalLight(0xffffff, 0.9);
      key.position.set(1, 1.5, 1);
      scene.add(key);
      const fill = new THREE.DirectionalLight(0x88aaff, 0.35);
      fill.position.set(-1, -0.5, -0.8);
      scene.add(fill);
      window.addEventListener('resize', () => {
        const w = canvas.clientWidth, h = canvas.clientHeight;
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
        renderer.setSize(w, h);
      });
      function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
      }
      animate();
      return { scene, camera, controls, renderer, canvas };
    }

    async function initMultiViewer(manifestPath) {
      setCrumbs(manifestPath);
      const { scene, camera, controls } = initScene();

      // Materials shared across all parts so toggles work globally.
      const standardMaterial = new THREE.MeshStandardMaterial({
        color: 0x6a92cc, metalness: 0.1, roughness: 0.65,
        flatShading: false, side: THREE.DoubleSide,
      });
      const surfaceAngleMaterial = new THREE.MeshNormalMaterial({
        side: THREE.DoubleSide, flatShading: true,
      });
      let wireframeOn = false;
      let surfaceAngleOn = false;
      const meshes = [];

      function applyMaterial() {
        const m = surfaceAngleOn ? surfaceAngleMaterial : standardMaterial;
        m.wireframe = wireframeOn;
        for (const mesh of meshes) mesh.material = m;
      }

      // Group container for the whole assembly; rotate -90° about X to map
      // TimF's longitudinal Y / vertical Z onto three.js's Y-up Z-forward frame.
      const assembly = new THREE.Group();
      assembly.rotation.x = -Math.PI / 2;
      scene.add(assembly);

      // Fetch the manifest then fetch each part in parallel.
      let manifest;
      try {
        const resp = await fetch(jsdelivrUrl(manifestPath));
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        manifest = await resp.json();
      } catch (e) {
        showError(e.message, `Couldn't load manifest <code>${manifestPath}</code>: ${e.message}`);
        return;
      }

      const partPaths = manifest.parts;
      const totalParts = partPaths.length;
      document.querySelector('#loading').innerHTML =
        `<span class="spinner"></span>Loading ${totalParts} parts…`;

      let totalTris = 0;
      let totalBytes = 0;
      const aggBox = new THREE.Box3();
      const results = await Promise.all(
        partPaths.map(p => fetchSTL(p).then(r => ({ p, r })).catch(e => ({ p, err: e })))
      );
      const loader = new STLLoader();
      for (const { p, r, err } of results) {
        if (err) {
          console.warn(`failed to load ${p}: ${err.message}`);
          continue;
        }
        let geom;
        try { geom = loader.parse(r.buf); } catch (e) {
          console.warn(`failed to parse ${p}: ${e.message}`); continue;
        }
        geom.computeVertexNormals();
        geom.computeBoundingBox();
        const mesh = new THREE.Mesh(geom, standardMaterial);
        mesh.userData.stlPath = p;
        mesh.userData.fileName = p.split('/').pop();
        assembly.add(mesh);
        meshes.push(mesh);
        totalTris += geom.attributes.position.count / 3;
        totalBytes += r.buf.byteLength;
      }
      if (meshes.length === 0) {
        showError('All parts failed to load.', '');
        return;
      }

      // Compute world-space bbox of the rotated assembly to size the grid +
      // fit the camera.
      assembly.updateMatrixWorld(true);
      aggBox.makeEmpty();
      assembly.traverse(obj => {
        if (obj.isMesh && obj.geometry) {
          obj.geometry.computeBoundingBox();
          aggBox.expandByObject(obj);
        }
      });
      const size = new THREE.Vector3();
      aggBox.getSize(size);
      const center = new THREE.Vector3();
      aggBox.getCenter(center);

      // Recenter the assembly so its bbox center sits at world origin.
      assembly.position.sub(center);

      const maxDim = Math.max(size.x, size.y, size.z);
      const fitDist = maxDim / (2 * Math.tan(Math.PI * camera.fov / 360)) * 1.4;
      controls.target.set(0, 0, 0);
      camera.position.set(fitDist, fitDist * 0.5, fitDist);
      camera.lookAt(0, 0, 0);
      camera.near = Math.max(0.1, maxDim / 1000);
      camera.far = maxDim * 100;
      camera.updateProjectionMatrix();

      const gridSize = Math.ceil(maxDim * 1.5 / 50) * 50;
      const gridHelper = new THREE.GridHelper(gridSize, gridSize / 10, 0x2d3340, 0x1a1f29);
      gridHelper.position.y = -size.y / 2;
      scene.add(gridHelper);

      // Stats + dims labels.
      document.getElementById('info').innerHTML =
        `<b>${meshes.length}</b> parts · <b>${totalTris.toLocaleString()}</b> triangles · ` +
        `<b>${(totalBytes / 1024 / 1024).toFixed(1)}</b> MB`;
      document.getElementById('dims').textContent =
        `${size.x.toFixed(0)} × ${size.y.toFixed(0)} × ${size.z.toFixed(0)} mm`;
      document.getElementById('loading').classList.add('done');

      // Hook up toggles.
      const initialCam = { pos: camera.position.clone(), target: controls.target.clone() };
      document.getElementById('reset').addEventListener('click', () => {
        camera.position.copy(initialCam.pos);
        controls.target.copy(initialCam.target);
        camera.lookAt(controls.target);
        controls.update();
      });
      document.getElementById('wireframe').addEventListener('click', (e) => {
        wireframeOn = !wireframeOn;
        applyMaterial();
        e.currentTarget.classList.toggle('active', wireframeOn);
      });
      document.getElementById('surface-angle').addEventListener('click', (e) => {
        surfaceAngleOn = !surfaceAngleOn;
        applyMaterial();
        updateOutlineColor();
        e.currentTarget.classList.toggle('active', surfaceAngleOn);
      });
      document.getElementById('rotate').addEventListener('click', (e) => {
        controls.autoRotate = !controls.autoRotate;
        e.currentTarget.classList.toggle('active', controls.autoRotate);
      });

      // ----- Hover/click interaction on assembled parts -----
      // Raycast against assembly children. Hover -> outline + show filename in
      // bottom-right. Click (not drag) -> open that part's STL in a new tab.
      const raycaster = new THREE.Raycaster();
      const ndc = new THREE.Vector2();
      const canvas = document.getElementById('canvas');
      const hoverLabel = document.getElementById('hover-label');
      let hoveredMesh = null;
      let pointerDownPos = null;
      let isPointerDown = false;
      let pendingMoveEvt = null;  // throttle pointermove to one rAF tick
      let lastMouseEvent = null;
      let shiftDown = false;
      let peekHiddenMesh = null;  // temporarily hidden while Shift+hovering

      // Hover outline. Color adapts to active material so it stays visible
      // in both modes (blue on standard, black on Surface Angle).
      const outlineMaterial = new THREE.LineBasicMaterial({
        color: 0x58a6ff,
        transparent: true,
        opacity: 0.95,
      });
      function updateOutlineColor() {
        outlineMaterial.color.setHex(surfaceAngleOn ? 0x000000 : 0x58a6ff);
      }

      function ensureOutline(mesh) {
        if (mesh.userData.outline) return mesh.userData.outline;
        // 30° angle threshold -> only feature edges, not every triangle.
        // For a 1.4M-triangle part this still costs ~200 ms; we precompute
        // these in the background so first-hover is instant.
        const edges = new THREE.EdgesGeometry(mesh.geometry, 30);
        const outline = new THREE.LineSegments(edges, outlineMaterial);
        outline.renderOrder = 2;
        mesh.userData.outline = outline;
        return outline;
      }

      function setHover(mesh) {
        if (hoveredMesh === mesh) return;
        if (hoveredMesh) {
          const prevOutline = hoveredMesh.userData.outline;
          if (prevOutline && prevOutline.parent === hoveredMesh) hoveredMesh.remove(prevOutline);
        }
        hoveredMesh = mesh;
        if (mesh) {
          mesh.add(ensureOutline(mesh));
          hoverLabel.textContent = mesh.userData.fileName || '';
          canvas.classList.add('hovering-part');
        } else {
          hoverLabel.textContent = '';
          canvas.classList.remove('hovering-part');
        }
      }

      function pickAt(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        ndc.x =  ((clientX - rect.left) / rect.width)  * 2 - 1;
        ndc.y = -((clientY - rect.top)  / rect.height) * 2 + 1;
        raycaster.setFromCamera(ndc, camera);
        const hits = raycaster.intersectObjects(meshes, false);
        return hits.length ? hits[0].object : null;
      }

      function processHover() {
        if (!lastMouseEvent) return;
        const x = lastMouseEvent.clientX, y = lastMouseEvent.clientY;
        if (shiftDown) {
          // pickAnyAt prevents avalanche: if the peeked mesh is still topmost
          // (when all visible), we keep peeking it instead of "hopping" to the
          // mesh behind it as soon as it becomes invisible.
          const hit = pickAnyAt(x, y);
          if (hit && hit.visible) startPeek(hit);
          else if (!hit || hit !== peekHiddenMesh) endPeek();
        } else {
          setHover(pickAt(x, y));
        }
      }

      canvas.addEventListener('pointermove', (e) => {
        // Don't update hover while the user is orbiting the camera — the lag
        // came from dragging through many parts and computing/swapping outlines
        // each frame.
        if (isPointerDown) return;
        lastMouseEvent = e;
        // Throttle hover picking to once per animation frame.
        if (!pendingMoveEvt) {
          requestAnimationFrame(() => {
            const ev = pendingMoveEvt;
            pendingMoveEvt = null;
            if (ev && !isPointerDown) processHover();
          });
        }
        pendingMoveEvt = e;
      });
      canvas.addEventListener('pointerleave', () => { endPeek(); setHover(null); });
      canvas.addEventListener('pointerdown', (e) => {
        if (e.button !== 0) return;  // only track left-click drags for "click vs drag"
        isPointerDown = true;
        pointerDownPos = { x: e.clientX, y: e.clientY };
        // Clear any hover state while dragging so nothing looks "stuck on".
        setHover(null);
      });
      canvas.addEventListener('pointerup', (e) => {
        if (e.button !== 0) return;
        isPointerDown = false;
        if (!pointerDownPos) return;
        const dx = e.clientX - pointerDownPos.x;
        const dy = e.clientY - pointerDownPos.y;
        const dragged = Math.hypot(dx, dy) > 5;
        pointerDownPos = null;
        if (dragged) return;  // it was an orbit drag, not a click
        if (e.shiftKey) {
          // Shift+click = same toggle as right-click (works around Mac
          // trackpad right-click ergonomics)
          toggleVisibilityAt(e.clientX, e.clientY);
          return;
        }
        const hit = pickAt(e.clientX, e.clientY);
        if (hit && hit.userData.stlPath) {
          const url = `viewer.html?stl=${encodeURIComponent(hit.userData.stlPath)}`;
          window.open(url, '_blank', 'noopener');
        }
      });

      // ----- Undo/redo for visibility actions -----
      // Each action is a list of {mesh, from, to} entries. Undo restores
      // `from`, redo restores `to`. Right-click hides one part (1-entry
      // action); "Show all" can be a multi-entry action.
      const undoStack = [];
      const redoStack = [];
      function recordAction(changes) {
        if (!changes.length) return;
        undoStack.push(changes);
        redoStack.length = 0;
      }
      function applyState(action, key) {
        for (const c of action) c.mesh.visible = c[key];
      }
      function undo() {
        const action = undoStack.pop();
        if (!action) return;
        applyState(action, 'from');
        redoStack.push(action);
      }
      function redo() {
        const action = redoStack.pop();
        if (!action) return;
        applyState(action, 'to');
        undoStack.push(action);
      }

      // Right-click / Shift+click: toggle visibility of the part under cursor.
      // pickAnyAt sees through hidden parts (temporarily flips them visible
      // for the raycast) so right-clicking a hidden part's area brings it
      // back.
      // OrbitControls binds right-click to PAN by default; disable that so it
      // doesn't fight with us.
      controls.mouseButtons.RIGHT = null;
      function pickAnyAt(clientX, clientY) {
        const saved = meshes.map(m => m.visible);
        for (const m of meshes) m.visible = true;
        const hit = pickAt(clientX, clientY);
        meshes.forEach((m, i) => { m.visible = saved[i]; });
        return hit;
      }
      function toggleVisibilityAt(clientX, clientY) {
        const hit = pickAnyAt(clientX, clientY);
        if (!hit) return;
        // A peek-hidden mesh's REAL state is visible; account for that so a
        // shift+click while peeking commits the hide instead of re-showing.
        const wasReallyVisible = (hit === peekHiddenMesh) ? true : hit.visible;
        const newReallyVisible = !wasReallyVisible;
        if (hit === peekHiddenMesh) peekHiddenMesh = null;
        if (hoveredMesh === hit) setHover(null);
        hit.visible = newReallyVisible;
        recordAction([{ mesh: hit, from: wasReallyVisible, to: newReallyVisible }]);
      }
      canvas.addEventListener('contextmenu', (e) => {
        e.preventDefault();
        toggleVisibilityAt(e.clientX, e.clientY);
      });

      // ----- Shift-peek: hold Shift to temporarily hide the hovered part -----
      function startPeek(mesh) {
        if (peekHiddenMesh === mesh) return;
        if (!mesh || !mesh.visible) return;  // can't peek-hide a really-hidden part
        if (peekHiddenMesh) endPeek();
        peekHiddenMesh = mesh;
        if (hoveredMesh === mesh) setHover(null);
        mesh.visible = false;
        hoverLabel.textContent = mesh.userData.fileName || '';
      }
      function endPeek() {
        if (!peekHiddenMesh) return;
        peekHiddenMesh.visible = true;
        peekHiddenMesh = null;
        hoverLabel.textContent = '';
      }

      // "Show all" — restore visibility of any parts the user hid.
      const showAllBtn = document.getElementById('show-all');
      showAllBtn.style.display = '';
      showAllBtn.addEventListener('click', () => {
        const changes = [];
        for (const m of meshes) {
          if (!m.visible) {
            changes.push({ mesh: m, from: false, to: true });
            m.visible = true;
          }
        }
        recordAction(changes);
      });

      // Keyboard shortcuts. Cross-platform: Cmd on macOS, Ctrl elsewhere.
      // Cmd/Ctrl+Z = undo, Cmd/Ctrl+Y = redo, Cmd/Ctrl+Shift+Z = redo (Mac).
      // Plain Shift starts peek-hide on the currently hovered part.
      window.addEventListener('keydown', (e) => {
        // Activate Shift-peek only when Shift is pressed alone — Cmd+Shift+Z
        // for redo should NOT peek-hide a part.
        if (e.key === 'Shift' && !shiftDown && !e.metaKey && !e.ctrlKey) {
          shiftDown = true;
          processHover();
        }
        if (!(e.metaKey || e.ctrlKey)) return;
        const k = e.key.toLowerCase();
        if (k === 'z') {
          e.preventDefault();
          if (e.shiftKey) redo(); else undo();
        } else if (k === 'y') {
          e.preventDefault();
          redo();
        }
      });
      window.addEventListener('keyup', (e) => {
        if (e.key === 'Shift' && shiftDown) {
          shiftDown = false;
          endPeek();
          processHover();  // re-evaluate to restore the normal outline
        }
      });
      // Releasing focus (Cmd-Tab away while holding Shift) doesn't always fire
      // a keyup. Reset state on blur so we don't get stuck peek-hidden.
      window.addEventListener('blur', () => {
        if (shiftDown) {
          shiftDown = false;
          endPeek();
        }
      });

      // Pre-compute outlines in the background (one per idle slot) so the
      // first hover on any part is instant. Big parts (fuse_2 ~1.4M tris)
      // take ~200 ms — doing them upfront avoids the hitch on first hover.
      const outlineQueue = meshes.slice();
      function precomputeOne() {
        if (outlineQueue.length === 0) return;
        ensureOutline(outlineQueue.shift());
        const schedule = window.requestIdleCallback || ((cb) => setTimeout(cb, 0));
        schedule(precomputeOne);
      }
      const schedule = window.requestIdleCallback || ((cb) => setTimeout(cb, 100));
      schedule(precomputeOne);
    }

    function initViewer(path) {
      setCrumbs(path);

      const canvas = document.getElementById('canvas');
      const w = canvas.clientWidth;
      const h = canvas.clientHeight;

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x0d1117);

      const camera = new THREE.PerspectiveCamera(50, w / h, 0.1, 100000);
      camera.position.set(200, 200, 200);

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(w, h);
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      canvas.appendChild(renderer.domElement);

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.07;
      controls.autoRotate = false;
      controls.autoRotateSpeed = 1.2;

      // Lights
      scene.add(new THREE.AmbientLight(0xffffff, 0.4));
      const key = new THREE.DirectionalLight(0xffffff, 0.9);
      key.position.set(1, 1.5, 1);
      scene.add(key);
      const fill = new THREE.DirectionalLight(0x88aaff, 0.35);
      fill.position.set(-1, -0.5, -0.8);
      scene.add(fill);

      // Grid (sized after we know bbox)
      let gridHelper = null;
      let mesh = null;
      let wireframeOn = false;
      let surfaceAngleOn = false;

      // Two materials we swap between. Standard is the default look; surface-
      // angle colors each face by the direction of its normal (R=X, G=Y, B=Z),
      // the same conventional "normal map" coloring github.com's STL viewer
      // uses for its Surface Angle mode.
      const standardMaterial = new THREE.MeshStandardMaterial({
        color: 0x6a92cc, metalness: 0.1, roughness: 0.65,
        flatShading: false, side: THREE.DoubleSide,
      });
      const surfaceAngleMaterial = new THREE.MeshNormalMaterial({
        side: THREE.DoubleSide, flatShading: true,
      });

      function applyMaterial() {
        if (!mesh) return;
        const m = surfaceAngleOn ? surfaceAngleMaterial : standardMaterial;
        m.wireframe = wireframeOn;
        mesh.material = m;
      }

      fetchSTL(path).then(({ buf, url }) => {
        const loader = new STLLoader();
        let geometry;
        try {
          geometry = loader.parse(buf);
        } catch (e) {
          showError('Parse error', `STL parse failed: <code>${e.message}</code>`);
          return;
        }
        geometry.computeBoundingBox();
        geometry.computeVertexNormals();

        mesh = new THREE.Mesh(geometry, standardMaterial);
        scene.add(mesh);

        const bbox = geometry.boundingBox;
        const size = new THREE.Vector3();
        bbox.getSize(size);
        const center = new THREE.Vector3();
        bbox.getCenter(center);

        // Re-center the mesh at world origin so it lines up with the grid
        // regardless of its location in TimF's global fuselage coordinate
        // frame. Bake the offset into the geometry so wireframe etc. follow.
        geometry.translate(-center.x, -center.y, -center.z);
        geometry.computeBoundingBox();

        // Camera fit on the now-centered mesh.
        const maxDim = Math.max(size.x, size.y, size.z);
        const fitDist = maxDim / (2 * Math.tan(Math.PI * camera.fov / 360)) * 1.5;
        controls.target.set(0, 0, 0);
        camera.position.set(fitDist, fitDist * 0.6, fitDist);
        camera.lookAt(0, 0, 0);
        camera.near = Math.max(0.1, maxDim / 1000);
        camera.far = maxDim * 100;
        camera.updateProjectionMatrix();

        // Grid sits directly under the centered mesh.
        const gridSize = Math.ceil(maxDim * 1.5 / 50) * 50;
        gridHelper = new THREE.GridHelper(gridSize, gridSize / 10, 0x2d3340, 0x1a1f29);
        gridHelper.position.y = -size.y / 2;
        scene.add(gridHelper);

        // Info text
        const triCount = geometry.attributes.position.count / 3;
        const sizeStr = `${size.x.toFixed(1)} × ${size.y.toFixed(1)} × ${size.z.toFixed(1)} mm`;
        document.getElementById('info').innerHTML =
          `<b>${triCount.toLocaleString()}</b> triangles · <b>${(buf.byteLength / 1024 / 1024).toFixed(1)}</b> MB`;
        document.getElementById('dims').textContent = sizeStr;
        document.getElementById('loading').classList.add('done');

        // Save initial camera state for reset.
        const initialCam = {
          pos: camera.position.clone(),
          target: controls.target.clone(),
        };
        document.getElementById('reset').addEventListener('click', () => {
          camera.position.copy(initialCam.pos);
          controls.target.copy(initialCam.target);
          camera.lookAt(controls.target);
          controls.update();
        });
      }).catch(err => {
        showError(err.message, `Couldn't fetch <code>${path}</code>: ${err.message}<br>The file might exceed jsDelivr's 50 MB limit, or the path might be wrong.`);
      });

      // Wireframe toggle (works in either material)
      document.getElementById('wireframe').addEventListener('click', (e) => {
        wireframeOn = !wireframeOn;
        applyMaterial();
        e.currentTarget.classList.toggle('active', wireframeOn);
      });
      // Surface angle toggle — swaps to MeshNormalMaterial (color = face normal direction)
      document.getElementById('surface-angle').addEventListener('click', (e) => {
        surfaceAngleOn = !surfaceAngleOn;
        applyMaterial();
        e.currentTarget.classList.toggle('active', surfaceAngleOn);
      });
      // Auto-rotate toggle
      document.getElementById('rotate').addEventListener('click', (e) => {
        controls.autoRotate = !controls.autoRotate;
        e.currentTarget.classList.toggle('active', controls.autoRotate);
      });

      // Resize handler
      window.addEventListener('resize', () => {
        const w = canvas.clientWidth;
        const h = canvas.clientHeight;
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
        renderer.setSize(w, h);
      });

      function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
      }
      animate();
    }
  </script>
</body>
</html>
